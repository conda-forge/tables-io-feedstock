{% set name = "tables-io" %}
{% set version = "1.1.1" %}
{% set python_min = "3.10" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  fn: {{ name }}-{{ version }}.tar.gz
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name.replace('-', '_') }}-{{ version }}.tar.gz
  sha256: 465fee8a17dc10ebb44c0643c06dba5e90a009977d500d9ab49eca956f434d60

build:
  number: 0

outputs:
  - name: {{ name }}
    script: build_base.sh
    build:
      noarch: python
    requirements:
      host:
        - python {{ python_min }}
        - pip
        - setuptools
        - setuptools_scm
      run:
        - python >={{ python_min }}
        - click
        - numpy
        - deprecated
        - pytables
        - h5py
        - pandas
    test:
      requires:
        - python {{ python_min }}
      imports:
        - tables_io

  - name: {{ name }}-full
    build:
      noarch: python
    requirements:
      host:
        - python {{ python_min }}
        - pip
        - setuptools
        - setuptools_scm
      run:
        - python >={{ python_min }}
        - {{ pin_subpackage('tables-io', max_pin='x.x.x') }}
        - astropy-base
        - pyarrow
    test:
      requires:
        - python {{ python_min }}
      imports:
        - tables_io

about:
  home: http://github.com/LSSTDESC/tables_io
  license: MIT
  license_family: MIT
  license_file: LICENSE
  summary: Input/output and conversion interfaces for tabular data formats.
  description: |
    Input/output and conversion interfaces for tabular data formats.
  dev_url: https://github.com/LSSTDESC/tables_io

extra:
  recipe-maintainers:
    - eacharles
    - brianv0
